<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Daily Moves" />
<meta name="theme-color" content="#fff4fb" />
<link rel="icon" href="favicon.ico" sizes="any" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="manifest" href="manifest.webmanifest" />
<title>Daily Moves</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#fff4fb;          /* light pink */
    --card:#ffffff;
    --ink:#20121a;            /* near-black, magenta whisper */
    --ink-soft:#444444;       /* dark gray */
    --ink-faint:#a08e96;      /* muted mauve-gray */
    --pine:#801d5c;           /* magenta — primary / active */
    --pine-deep:#5e1444;      /* deep magenta */
    --honey:#c02e80;          /* fuchsia — streak / celebration */
    --honey-soft:#f7d9e8;     /* light fuchsia tint */
    --sage:#d9b9cb;           /* inactive dot — soft mauve */
    --sage-tint:#fbe8f2;      /* inactive fill — pale pink */
    --line:rgba(128,29,92,.14);
    --line-strong:rgba(128,29,92,.24);
    --r:18px;
    --shadow:0 1px 2px rgba(33,37,25,.05), 0 8px 24px -16px rgba(33,37,25,.22);
    --display:"Bricolage Grotesque","Trebuchet MS",system-ui,sans-serif;
    --body:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--body);
    font-size:16px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{max-width:560px;margin:0 auto;padding:22px 18px 64px}
  .eyebrow{
    font-family:var(--body);font-weight:600;font-size:12px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--ink-faint);margin:0 0 8px;
  }
  h1,h2,h3{font-family:var(--display);margin:0;font-weight:600;letter-spacing:-.01em}

  /* ---------- header ---------- */
  .greet{font-size:27px;line-height:1.15;font-weight:700;letter-spacing:-.02em}
  .encourage{color:var(--ink-soft);font-size:15.5px;margin:7px 0 0;max-width:42ch}

  .top{
    display:flex;gap:18px;align-items:center;margin-top:20px;
    background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:18px 18px;box-shadow:var(--shadow);
  }
  .ring{flex:0 0 auto;width:96px;height:96px;position:relative}
  .ring svg{transform:rotate(-90deg);display:block}
  .ring__num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1}
  .ring__big{font-family:var(--display);font-weight:700;font-size:26px}
  .ring__small{font-size:11px;color:var(--ink-faint);margin-top:3px;font-weight:600;letter-spacing:.02em}
  .stats{display:flex;flex-direction:column;gap:10px;flex:1 1 auto;min-width:0}
  .stat{display:flex;align-items:center;gap:9px}
  .stat__ico{flex:0 0 auto;width:26px;height:26px;display:grid;place-items:center;border-radius:8px;background:var(--sage-tint);color:var(--pine)}
  .stat__ico.is-streak{background:var(--honey-soft);color:var(--pine-deep)}
  .stat__txt{display:flex;align-items:baseline;gap:6px;min-width:0}
  .stat__n{font-family:var(--display);font-weight:700;font-size:18px;letter-spacing:-.01em}
  .stat__l{font-size:13px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* ---------- section heads ---------- */
  .sec{margin-top:30px}
  .sec__head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:13px}
  .sec__title{font-size:13px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-family:var(--body)}
  .sec__note{font-size:13px;color:var(--ink-faint)}

  /* ---------- move cards ---------- */
  .move{
    background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:15px 16px 14px;margin-bottom:12px;box-shadow:var(--shadow);
    transition:border-color .25s ease, box-shadow .25s ease;
  }
  .move.is-done{border-color:rgba(47,107,71,.38)}
  .move__top{display:flex;align-items:flex-start;gap:11px}
  .move__dot{flex:0 0 auto;width:11px;height:11px;border-radius:50%;background:var(--sage);margin-top:6px;transition:background .25s ease}
  .move.is-done .move__dot{background:var(--pine)}
  .move__id{flex:1 1 auto;min-width:0}
  .move__name{font-family:var(--display);font-weight:600;font-size:18px;letter-spacing:-.01em;line-height:1.2}
  .move__detail{font-size:13.5px;color:var(--ink-soft);margin-top:2px}
  .move__pencil{
    flex:0 0 auto;border:1px solid var(--line);background:transparent;color:var(--ink-faint);
    width:32px;height:32px;border-radius:9px;cursor:pointer;display:grid;place-items:center;
    transition:background .15s,color .15s,border-color .15s;
  }
  .move__pencil:hover{color:var(--ink);border-color:var(--line-strong);background:var(--sage-tint)}
  .move__row{display:flex;align-items:center;gap:12px;margin-top:14px;flex-wrap:wrap}
  .stepper{display:inline-flex;align-items:center;background:var(--sage-tint);border-radius:13px;padding:4px;gap:2px}
  .stepper button{
    width:40px;height:40px;border:none;background:transparent;border-radius:10px;cursor:pointer;
    color:var(--pine-deep);display:grid;place-items:center;transition:background .12s,transform .05s;
  }
  .stepper button:hover{background:#fff}
  .stepper button:active{transform:scale(.92)}
  .stepper input{
    width:62px;height:40px;border:none;background:transparent;text-align:center;
    font-family:var(--display);font-weight:700;font-size:21px;color:var(--ink);
    -moz-appearance:textfield;
  }
  .stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .move__meta{font-size:13.5px;color:var(--ink-soft);display:flex;align-items:center;gap:8px}
  .pill{
    display:none;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--pine);
    background:rgba(47,107,71,.10);border-radius:999px;padding:4px 10px;
  }
  .move.is-done .pill{display:inline-flex}

  /* ---------- add / form ---------- */
  .add-btn{
    width:100%;border:1.5px dashed var(--line-strong);background:transparent;border-radius:var(--r);
    padding:15px;cursor:pointer;color:var(--ink-soft);font-family:var(--body);font-weight:600;font-size:15px;
    display:flex;align-items:center;justify-content:center;gap:9px;transition:border-color .15s,background .15s,color .15s;
  }
  .add-btn:hover{border-color:var(--pine);color:var(--pine);background:rgba(47,107,71,.05)}
  .form{
    background:var(--card);border:1px solid var(--line-strong);border-radius:var(--r);
    padding:18px 16px;box-shadow:var(--shadow);
  }
  .form h3{font-size:18px;margin-bottom:4px}
  .form__sub{font-size:13.5px;color:var(--ink-soft);margin:0 0 16px}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;letter-spacing:.01em}
  .field input{
    width:100%;border:1px solid var(--line-strong);border-radius:11px;padding:11px 13px;
    font-family:var(--body);font-size:15.5px;color:var(--ink);background:#fff;
  }
  .field input:focus{outline:none;border-color:var(--pine);box-shadow:0 0 0 3px rgba(47,107,71,.13)}
  .field--split{display:flex;gap:12px}
  .field--split>div{flex:1}
  .form__actions{display:flex;gap:10px;align-items:center;margin-top:18px}
  .btn{
    border:none;border-radius:12px;padding:12px 18px;font-family:var(--body);font-weight:600;font-size:15px;cursor:pointer;
    transition:transform .05s, filter .15s;
  }
  .btn:active{transform:translateY(1px)}
  .btn--primary{background:var(--pine);color:#fff}
  .btn--primary:hover{filter:brightness(1.07)}
  .btn--ghost{background:transparent;color:var(--ink-soft)}
  .btn--ghost:hover{color:var(--ink)}
  .btn--danger{background:transparent;color:#FC0000;margin-left:auto;font-size:14px;padding:12px 8px}
  .btn--danger:hover{color:#c00000}

  /* ---------- empty ---------- */
  .empty{
    background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:28px 22px;text-align:center;box-shadow:var(--shadow);
  }
  .empty h3{font-size:19px;margin-bottom:6px}
  .empty p{color:var(--ink-soft);font-size:15px;margin:0 auto 18px;max-width:34ch}

  /* ---------- consistency heatmap ---------- */
  .heat-card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:16px 14px 14px;box-shadow:var(--shadow);overflow:hidden;
  }
  .heat-scroll{overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
  .heat-grid{display:flex;gap:4px;width:max-content;padding-top:2px}
  .heat-col{display:flex;flex-direction:column;gap:4px}
  .heat-cell{width:15px;height:15px;border-radius:4px;background:var(--sage-tint);}
  .heat-cell.f1{background:#e6b9d2}
  .heat-cell.f2{background:#cd81a9}
  .heat-cell.f3{background:#c02e80}
  .heat-cell.f4{background:#801d5c}
  .heat-cell.future{background:transparent}
  .heat-months{display:flex;gap:4px;width:max-content;margin-bottom:6px}
  .heat-month{font-size:11px;color:var(--ink-faint);height:14px}
  .heat-legend{display:flex;align-items:center;gap:6px;justify-content:flex-end;margin-top:12px;font-size:11.5px;color:var(--ink-faint)}
  .heat-legend .heat-cell{width:12px;height:12px}

  /* ---------- progress ---------- */
  .prog{
    background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:15px 16px;margin-bottom:12px;box-shadow:var(--shadow);
  }
  .prog__head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:12px}
  .prog__name{font-family:var(--display);font-weight:600;font-size:16px}
  .prog__facts{font-size:12.5px;color:var(--ink-soft);white-space:nowrap}
  .prog__facts b{color:var(--pine);font-weight:700}
  .bars{display:flex;align-items:flex-end;gap:4px;height:52px}
  .bar{flex:1;background:var(--sage-tint);border-radius:3px 3px 2px 2px;min-height:3px;position:relative;transition:height .4s ease}
  .bar.has{background:var(--pine)}
  .bar.today{background:var(--honey)}
  .bars-axis{display:flex;justify-content:space-between;font-size:10.5px;color:var(--ink-faint);margin-top:6px}

  .foot{margin-top:34px;text-align:center;font-size:12.5px;color:var(--ink-faint);line-height:1.6}
  .foot__line{margin:0}
  .foot__meta{margin:14px 0 0;font-size:11.5px;letter-spacing:.02em}
  .foot__by{margin:6px 0 0;font-family:var(--display);font-weight:600;font-size:14px;color:var(--pine);letter-spacing:.01em}

  /* ---------- top bar ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px}
  .wordmark{font-family:var(--display);font-weight:700;font-size:15px;letter-spacing:-.01em;color:var(--pine)}
  .refresh{
    display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--card);
    color:var(--pine);font-family:var(--body);font-weight:600;font-size:13px;
    padding:7px 12px 7px 10px;border-radius:999px;cursor:pointer;box-shadow:var(--shadow);
    transition:transform .05s, border-color .15s, background .15s;
  }
  .refresh:hover{border-color:var(--line-strong);background:var(--sage-tint)}
  .refresh:active{transform:scale(.96)}
  .refresh svg{transition:transform .5s ease}
  .refresh:active svg{transform:rotate(-180deg)}

  a.link{color:var(--pine);text-decoration:none;font-weight:600}
  :focus-visible{outline:2.5px solid var(--pine);outline-offset:2px;border-radius:6px}

  @media (max-width:380px){
    .greet{font-size:24px}
    .ring{width:84px;height:84px}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none !important;animation:none !important}
  }
</style>
</head>
<body>
  <div class="wrap" id="app" aria-live="polite">
    <p class="eyebrow" style="text-align:center;margin-bottom:40px;color:var(--ink-faint)">loading your moves…</p>
  </div>

<script>
/* =========================================================
   Daily Moves — a flexible, no-pressure exercise tracker.
   Data persists across sessions via window.storage.
   ========================================================= */

// ---------- icons ----------
const I = {
  sprout:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22V11"/><path d="M12 11c0-3-2.5-5-6-5 0 3.5 2.5 5.5 6 5z"/><path d="M12 13c0-2.5 2.2-4.5 6-4.5 0 3-2.5 4.5-6 4.5z"/></svg>',
  trophy:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9a6 6 0 0 0 12 0V4H6z"/><path d="M6 5H3.5A1.5 1.5 0 0 0 2 6.5C2 8.5 4 9 6 9"/><path d="M18 5h2.5A1.5 1.5 0 0 1 22 6.5C22 8.5 20 9 18 9"/><path d="M9 20h6M12 15v5"/></svg>',
  calendar:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>',
  plus:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 6v12M6 12h12"/></svg>',
  minus:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 12h12"/></svg>',
  pencil:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>',
  check:'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
  add:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
  refresh:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v5h-5"/></svg>'
};

// ---------- app meta ----------
const APP_VERSION = 'v1.2.0';

// "Last updated" reads the file's own modification time (the Last-Modified header
// GitHub Pages sends), so it always reflects the real deploy — no manual edits.
function lastUpdatedText(){
  try{
    const d = new Date(document.lastModified);
    if(isNaN(d.getTime())) throw 0;
    return d.toLocaleString(undefined,{year:'numeric',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
  }catch(e){ return 'Jun 30, 2026'; }
}

// Pull the freshest copy of the app from the server without clearing progress.
// Progress lives in browser storage (per-origin) and survives this reload — the
// "?r=" cache-buster just stops the phone from serving a stale cached page.
function hardRefresh(){
  location.replace(location.pathname + '?r=' + Date.now() + location.hash);
}

// ---------- date helpers (local time, never UTC) ----------
const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function ymd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function todayStr(){return ymd(new Date());}
function parseYmd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function addDays(s,n){const d=parseYmd(s);d.setDate(d.getDate()+n);return ymd(d);}
function prettyDate(s){const d=parseYmd(s);return d.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});}

// ---------- state ----------
let exercises = [];      // {id,name,detail,unit,step}
let logs = {};           // {'YYYY-MM-DD': {exId: count}}
let editing = null;      // exercise id, 'new', or null
const today = todayStr();
let prevBest = 0;        // to detect a new record this session

// ---------- storage adapter ----------
// Inside Claude, window.storage persists data. When this file is hosted on its
// own (e.g. GitHub Pages), that doesn't exist, so we fall back to the browser's
// localStorage. Same file works in both places.
const Store = {
  async get(key){
    if(window.storage && window.storage.get) return window.storage.get(key);
    const v = localStorage.getItem('dm:'+key);
    if(v===null) throw new Error('not found');
    return {key, value:v};
  },
  async set(key, value){
    if(window.storage && window.storage.set) return window.storage.set(key, value);
    localStorage.setItem('dm:'+key, value);
    return {key, value};
  }
};

// ---------- storage ----------
async function loadAll(){
  try{
    const r = await Store.get('exercises');
    exercises = JSON.parse(r.value);
  }catch(e){
    // First ever run — seed the example the way you described it.
    exercises = [{id:uid(),name:'Deep squats',detail:'14 kg dumbbells',unit:'reps',step:1}];
    await saveExercises();
  }
  try{
    const r = await Store.get('logs');
    logs = JSON.parse(r.value);
  }catch(e){ logs = {}; }
  if(!logs || typeof logs!=='object') logs = {};
}
async function saveExercises(){ try{ await Store.set('exercises', JSON.stringify(exercises)); }catch(e){ console.error('save exercises',e); } }
async function saveLogs(){ try{ await Store.set('logs', JSON.stringify(logs)); }catch(e){ console.error('save logs',e); } }
function uid(){return 'm'+Math.random().toString(36).slice(2,9);}

// ---------- derived ----------
function dayTotal(s){const d=logs[s]||{};let t=0;for(const k in d)t+=Number(d[k])||0;return t;}
function isActive(s){return dayTotal(s)>0;}
function getCount(exId,s){const d=logs[s]||{};return Number(d[exId])||0;}
function personalMax(){let m=1;for(const s in logs){const t=dayTotal(s);if(t>m)m=t;}return m;}

function streaks(){
  let cur=0, anchor=today;
  if(!isActive(anchor)) anchor=addDays(anchor,-1);
  if(isActive(anchor)){let d=anchor;while(isActive(d)){cur++;d=addDays(d,-1);}}
  const days=Object.keys(logs).filter(isActive).sort();
  let best=0,run=0,prev=null;
  for(const d of days){ run=(prev&&addDays(prev,1)===d)?run+1:1; if(run>best)best=run; prev=d; }
  best=Math.max(best,cur);
  return {current:cur,best,total:days.length,todayDone:isActive(today)};
}

// ---------- encouragement copy ----------
function encourageLine(s){
  const total = exercises.length;
  const doneToday = exercises.filter(e=>getCount(e.id,today)>0).length;
  if(total===0) return "Add one move you'd actually do today. We grow from there.";
  if(s.todayDone && s.current>0 && s.current===s.best && s.current>prevBest && prevBest>0)
    return `New best — ${s.current} days in a row. Look at that.`;
  if(doneToday===total && total>0) return "Everything's logged. This is exactly what consistency looks like.";
  if(doneToday>0) return `${doneToday} of ${total} logged. No need to finish — every bit counts.`;
  if(s.current>0) return `Your ${s.current}-day run is still warm. Log anything to keep it going.`;
  if(s.total>0) return "Yesterday's done. Today's open — one rep gets you moving.";
  return "Day one. Pick a move below and log whatever you can manage.";
}
function greeting(){const h=new Date().getHours();return h<12?'Good morning':h<18?'Good afternoon':'Good evening';}

// ========================================================
//  RENDER
// ========================================================
const app = document.getElementById('app');

function render(){
  const s = streaks();
  app.innerHTML =
    topbar() +
    header(s) +
    todaySection() +
    (editing!==null ? formSection() : '') +
    consistencySection() +
    progressSection() +
    footer();
  // scroll heatmap to the most recent week
  const hs = document.querySelector('.heat-scroll');
  if(hs) hs.scrollLeft = hs.scrollWidth;
  prevBest = s.best;
}

function topbar(){
  return `
  <div class="topbar">
    <span class="wordmark">Daily Moves</span>
    <button class="refresh" data-action="refresh" aria-label="Check for the latest version">
      ${I.refresh}<span>Refresh</span>
    </button>
  </div>`;
}

function footer(){
  return `
  <footer class="foot">
    <p class="foot__line">Do what you can, when you can.<br>Your moves, counts and streaks save automatically and stay here.</p>
    <p class="foot__meta">Daily Moves ${APP_VERSION} · Updated ${lastUpdatedText()}</p>
    <p class="foot__by">Made by Niza</p>
  </footer>`;
}

function header(s){
  const total = exercises.length;
  const done = exercises.filter(e=>getCount(e.id,today)>0).length;
  const frac = total? done/total : 0;
  const R=42, C=2*Math.PI*R, off=C*(1-frac);
  return `
  <header>
    <p class="eyebrow">${prettyDate(today)}</p>
    <h1 class="greet">${greeting()}.</h1>
    <p class="encourage" id="encourage">${encourageLine(s)}</p>
    <div class="top">
      <div class="ring" id="ring">
        <svg width="96" height="96" viewBox="0 0 96 96">
          <circle cx="48" cy="48" r="${R}" fill="none" stroke="var(--sage-tint)" stroke-width="9"/>
          <circle cx="48" cy="48" r="${R}" fill="none" stroke="${frac>=1?'var(--honey)':'var(--pine)'}" stroke-width="9"
            stroke-linecap="round" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"
            style="transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)"/>
        </svg>
        <div class="ring__num">
          <span class="ring__big">${done}</span>
          <span class="ring__small">${total?('of '+total+' today'):'no moves yet'}</span>
        </div>
      </div>
      <div class="stats" id="stats">${statsRows(s)}</div>
    </div>
  </header>`;
}
function statsRows(s){
  return `
    <div class="stat">
      <span class="stat__ico is-streak">${I.sprout}</span>
      <span class="stat__txt"><span class="stat__n">${s.current}</span><span class="stat__l">day streak${s.current>0&&!s.todayDone?' · keep it alive':''}</span></span>
    </div>
    <div class="stat">
      <span class="stat__ico">${I.trophy}</span>
      <span class="stat__txt"><span class="stat__n">${s.best}</span><span class="stat__l">best streak</span></span>
    </div>
    <div class="stat">
      <span class="stat__ico">${I.calendar}</span>
      <span class="stat__txt"><span class="stat__n">${s.total}</span><span class="stat__l">days shown up</span></span>
    </div>`;
}

function todaySection(){
  if(exercises.length===0 && editing===null){
    return `<section class="sec">
      <div class="empty">
        <h3>Nothing tracked yet</h3>
        <p>Add a move you want to build into your days — like deep squats, a plank, or a walk.</p>
        <button class="btn btn--primary" data-action="add-open">${I.add}&nbsp; Add your first move</button>
      </div>
    </section>`;
  }
  const cards = exercises.map(moveCard).join('');
  const addBtn = editing===null
    ? `<button class="add-btn" data-action="add-open">${I.add} Add a move</button>` : '';
  return `<section class="sec">
    <div class="sec__head"><span class="sec__title">Today</span><span class="sec__note">tap + as you go</span></div>
    ${cards}
    ${addBtn}
  </section>`;
}

function moveCard(e){
  const c = getCount(e.id,today);
  const unit = e.unit||'reps';
  return `
  <div class="move ${c>0?'is-done':''}" data-card="${e.id}">
    <div class="move__top">
      <span class="move__dot"></span>
      <div class="move__id">
        <div class="move__name">${esc(e.name)}</div>
        ${e.detail?`<div class="move__detail">${esc(e.detail)}</div>`:''}
      </div>
      <button class="move__pencil" data-action="edit" data-id="${e.id}" aria-label="Edit ${esc(e.name)}">${I.pencil}</button>
    </div>
    <div class="move__row">
      <div class="stepper">
        <button data-action="dec" data-id="${e.id}" aria-label="Subtract from ${esc(e.name)}">${I.minus}</button>
        <input type="number" inputmode="numeric" min="0" value="${c}" data-count="${e.id}" aria-label="${esc(e.name)} count today">
        <button data-action="inc" data-id="${e.id}" aria-label="Add to ${esc(e.name)}">${I.plus}</button>
      </div>
      <span class="move__meta" data-meta="${e.id}">
        <span class="pill">${I.check} logged</span>
        <span data-unit="${e.id}">${c>0?c+' '+unit+' today':'add when you do some'}</span>
      </span>
    </div>
  </div>`;
}

function formSection(){
  const e = editing==='new' ? {name:'',detail:'',unit:'reps',step:1} : exercises.find(x=>x.id===editing);
  if(!e) return '';
  const isNew = editing==='new';
  return `<section class="sec">
    <div class="form">
      <h3>${isNew?'New move':'Edit move'}</h3>
      <p class="form__sub">No targets here — you decide how much each day.</p>
      <div class="field">
        <label for="f-name">Move</label>
        <input id="f-name" type="text" value="${esc(e.name)}" placeholder="e.g. Deep squats" autocomplete="off">
      </div>
      <div class="field">
        <label for="f-detail">Detail <span style="color:var(--ink-faint);font-weight:400">(optional)</span></label>
        <input id="f-detail" type="text" value="${esc(e.detail||'')}" placeholder="e.g. 14 kg dumbbells" autocomplete="off">
      </div>
      <div class="field field--split">
        <div>
          <label for="f-unit">Counts in</label>
          <input id="f-unit" type="text" value="${esc(e.unit||'reps')}" placeholder="reps" autocomplete="off">
        </div>
        <div>
          <label for="f-step">Each + adds</label>
          <input id="f-step" type="number" min="1" value="${e.step||1}">
        </div>
      </div>
      <div class="form__actions">
        <button class="btn btn--primary" data-action="form-save">${isNew?'Add move':'Save'}</button>
        <button class="btn btn--ghost" data-action="form-cancel">Cancel</button>
        ${isNew?'':`<button class="btn btn--danger" data-action="form-remove" data-id="${e.id}">Remove move</button>`}
      </div>
    </div>
  </section>`;
}

// ---------- consistency heatmap ----------
function consistencySection(){
  const WEEKS=18, max=personalMax();
  const t=new Date(); const dow=t.getDay();
  const lastSunday=addDays(today,-dow);
  const firstSunday=addDays(lastSunday,-7*(WEEKS-1));
  let cols='', months='', lastMonthLabel='';
  for(let w=0;w<WEEKS;w++){
    const weekStart=addDays(firstSunday,7*w);
    const mo=parseYmd(weekStart).getMonth();
    const label=(mo!==lastMonthLabel && parseYmd(weekStart).getDate()<=7)?MON[mo]:'';
    if(label) lastMonthLabel=mo;
    months+=`<div class="heat-month" style="width:15px">${w===0?MON[parseYmd(weekStart).getMonth()]:label}</div>`;
    let cells='';
    for(let r=0;r<7;r++){
      const d=addDays(weekStart,r);
      if(d>today){ cells+=`<div class="heat-cell future"></div>`; continue; }
      const v=dayTotal(d);
      let f=0; if(v>0){const ratio=v/max; f=ratio<=.25?1:ratio<=.5?2:ratio<=.75?3:4;}
      cells+=`<div class="heat-cell f${f}" title="${prettyDate(d)} — ${v?v+' total':'rest'}"></div>`;
    }
    cols+=`<div class="heat-col">${cells}</div>`;
  }
  return `<section class="sec">
    <div class="sec__head"><span class="sec__title">Consistency</span><span class="sec__note">last 18 weeks</span></div>
    <div class="heat-card">
      <div class="heat-scroll">
        <div class="heat-months">${months}</div>
        <div class="heat-grid">${cols}</div>
      </div>
      <div class="heat-legend">less
        <span class="heat-cell f0"></span><span class="heat-cell f1"></span>
        <span class="heat-cell f2"></span><span class="heat-cell f3"></span><span class="heat-cell f4"></span>more
      </div>
    </div>
  </section>`;
}

// ---------- per-move progress ----------
function progressSection(){
  if(exercises.length===0) return '';
  const N=14;
  const dates=[]; for(let i=N-1;i>=0;i--) dates.push(addDays(today,-i));
  const blocks = exercises.map(e=>{
    const vals=dates.map(d=>getCount(e.id,d));
    const mx=Math.max(1,...vals);
    let allTotal=0,best=0;
    for(const d in logs){const v=Number((logs[d]||{})[e.id])||0;allTotal+=v;if(v>best)best=v;}
    const bars=vals.map((v,i)=>{
      const h=v>0?Math.max(8,Math.round(v/mx*100)):4;
      const cls=v>0?(dates[i]===today?'bar has today':'bar has'):'bar';
      return `<div class="${cls}" style="height:${h}%" title="${prettyDate(dates[i])}: ${v} ${esc(e.unit||'reps')}"></div>`;
    }).join('');
    return `<div class="prog">
      <div class="prog__head">
        <span class="prog__name">${esc(e.name)}</span>
        <span class="prog__facts"><b>${allTotal}</b> all-time · best day <b>${best}</b></span>
      </div>
      <div class="bars">${bars}</div>
      <div class="bars-axis"><span>2 weeks ago</span><span>today</span></div>
    </div>`;
  }).join('');
  return `<section class="sec">
    <div class="sec__head"><span class="sec__title">Progress</span><span class="sec__note">last 14 days</span></div>
    ${blocks}
  </section>`;
}

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// ========================================================
//  PARTIAL UPDATE (keeps focus while typing a count)
// ========================================================
function setCount(exId,val){
  val=Math.max(0,Math.floor(Number(val)||0));
  if(!logs[today]) logs[today]={};
  if(val===0) delete logs[today][exId]; else logs[today][exId]=val;
  if(Object.keys(logs[today]).length===0) delete logs[today];
  saveLogs();
  // update this card in place
  const card=document.querySelector(`[data-card="${exId}"]`);
  if(card){
    card.classList.toggle('is-done',val>0);
    const ex=exercises.find(x=>x.id===exId);
    const unitSpan=card.querySelector(`[data-unit="${exId}"]`);
    if(unitSpan) unitSpan.textContent = val>0 ? `${val} ${ex.unit||'reps'} today` : 'add when you do some';
  }
  refreshDerived();
}
function refreshDerived(){
  const s=streaks();
  const ring=document.getElementById('ring');
  const stats=document.getElementById('stats');
  const enc=document.getElementById('encourage');
  if(ring){ // rebuild ring via header fragment slice
    const tmp=document.createElement('div'); tmp.innerHTML=header(s);
    document.getElementById('ring').replaceWith(tmp.querySelector('#ring'));
  }
  if(stats) stats.innerHTML=statsRows(s);
  if(enc) enc.textContent=encourageLine(s);
  // refresh heatmap + progress (no focusable inputs inside)
  const heat=document.querySelector('.heat-card'); if(heat){const t=document.createElement('div');t.innerHTML=consistencySection();heat.replaceWith(t.querySelector('.heat-card'));const hs=document.querySelector('.heat-scroll'); if(hs) hs.scrollLeft=hs.scrollWidth;}
  // progress: replace all .prog blocks
  const firstProg=document.querySelector('.prog');
  if(firstProg){
    const wrap=document.createElement('div'); wrap.innerHTML=progressSection();
    const newBlocks=wrap.querySelectorAll('.prog');
    const oldBlocks=document.querySelectorAll('.prog');
    oldBlocks.forEach((b,i)=>{ if(newBlocks[i]) b.replaceWith(newBlocks[i]); });
  }
  prevBest=s.best;
}

// ========================================================
//  EVENTS (delegated)
// ========================================================
app.addEventListener('click', e=>{
  const btn=e.target.closest('[data-action]');
  if(!btn) return;
  const action=btn.dataset.action, id=btn.dataset.id;
  if(action==='refresh'){ hardRefresh(); return; }
  if(action==='inc'){ const ex=exercises.find(x=>x.id===id); const cur=getCount(id,today); const nv=cur+(ex.step||1); const inp=document.querySelector(`[data-count="${id}"]`); if(inp)inp.value=nv; setCount(id,nv); }
  else if(action==='dec'){ const ex=exercises.find(x=>x.id===id); const cur=getCount(id,today); const nv=Math.max(0,cur-(ex.step||1)); const inp=document.querySelector(`[data-count="${id}"]`); if(inp)inp.value=nv; setCount(id,nv); }
  else if(action==='add-open'){ editing='new'; render(); document.getElementById('f-name')?.focus(); }
  else if(action==='edit'){ editing=id; render(); document.getElementById('f-name')?.focus(); }
  else if(action==='form-cancel'){ editing=null; render(); }
  else if(action==='form-save'){ saveForm(); }
  else if(action==='form-remove'){ removeMove(btn.dataset.id); }
});

app.addEventListener('input', e=>{
  const inp=e.target.closest('[data-count]');
  if(inp){ setCount(inp.dataset.count, inp.value); }
});
app.addEventListener('change', e=>{
  const inp=e.target.closest('[data-count]');
  if(inp){ inp.value=Math.max(0,Math.floor(Number(inp.value)||0)); }
});

function saveForm(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){ document.getElementById('f-name').focus(); document.getElementById('f-name').style.borderColor='#FC0000'; return; }
  const detail=document.getElementById('f-detail').value.trim();
  const unit=document.getElementById('f-unit').value.trim()||'reps';
  const step=Math.max(1,Math.floor(Number(document.getElementById('f-step').value)||1));
  if(editing==='new'){ exercises.push({id:uid(),name,detail,unit,step}); }
  else { const ex=exercises.find(x=>x.id===editing); if(ex){ex.name=name;ex.detail=detail;ex.unit=unit;ex.step=step;} }
  editing=null; saveExercises(); render();
}
function removeMove(id){
  exercises=exercises.filter(x=>x.id!==id);
  for(const d in logs){ if(logs[d][id]!==undefined){ delete logs[d][id]; if(Object.keys(logs[d]).length===0) delete logs[d]; } }
  editing=null; saveExercises(); saveLogs(); render();
}

// ---------- boot ----------
(async function(){
  await loadAll();
  prevBest = streaks().best;
  render();
})();
</script>
</body>
</html>
